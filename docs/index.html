<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fannie Mae Loan Data — DataFusion WASM</title>
    <style>
      :root { --bg: #1a1a2e; --surface: #16213e; --primary: #e94560; --text: #eaeaea; --muted: #888; --border: #333; --success: #4caf50; --error: #f44336; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
      header { background: var(--surface); padding: 1.5rem 2rem; border-bottom: 2px solid var(--primary); }
      header h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
      .subtitle { color: var(--muted); font-size: 0.9rem; }
      main { max-width: 100%; padding: 1rem; }
      .query-panel { background: var(--surface); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
      #sql-input { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem; font-family: monospace; font-size: 0.9rem; resize: vertical; }
      #sql-input:focus { outline: none; border-color: var(--primary); }
      .query-actions { display: flex; align-items: center; gap: 1rem; margin-top: 0.75rem; }
      #run-btn { background: var(--primary); color: white; border: none; border-radius: 6px; padding: 0.5rem 1.5rem; font-size: 0.9rem; cursor: pointer; }
      #run-btn:hover { opacity: 0.85; }
      #run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .hint { color: var(--muted); font-size: 0.8rem; }
      .status { margin-left: auto; font-size: 0.8rem; }
      .status.success { color: var(--success); } .status.error { color: var(--error); } .status.loading { color: var(--muted); }
      .init-panel { background: var(--surface); border-radius: 8px; padding: 2rem; text-align: center; margin-bottom: 1rem; }
      .init-panel p { color: var(--muted); margin-bottom: 1rem; }
      .progress-bar { width: 100%; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin: 0.5rem 0; }
      .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.5s; width: 0%; }
      .results { background: var(--surface); border-radius: 8px; padding: 1rem; overflow-x: auto; }
      .hidden { display: none; }
      .error { color: var(--error); padding: 1rem; border: 1px solid var(--error); border-radius: 6px; white-space: pre-wrap; font-family: monospace; font-size: 0.85rem; }
      #result-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
      #result-table th { background: var(--bg); color: var(--primary); padding: 0.5rem 0.75rem; text-align: left; white-space: nowrap; position: sticky; top: 0; }
      #result-table td { padding: 0.35rem 0.75rem; border-bottom: 1px solid var(--border); white-space: nowrap; max-width: 250px; overflow: hidden; text-overflow: ellipsis; }
      #result-table tr:hover td { background: rgba(233, 69, 96, 0.08); }
      #row-count { color: var(--muted); font-size: 0.8rem; margin-top: 0.5rem; }
    </style>
  </head>
  <body>
    <header>
      <h1>Fannie Mae Loan Performance Data</h1>
      <p class="subtitle">2024 Q1 — 3,989,404 loans — DataFusion WASM</p>
    </header>
    <main>
      <div id="loading" class="init-panel">
        <p id="load-status">Loading DataFusion WASM engine…</p>
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
      </div>
      <div id="app" class="hidden">
        <section class="query-panel">
          <textarea id="sql-input" rows="4">SELECT loan_id, property_state, original_upb, original_interest_rate, borrower_credit_score_at_origination
FROM "Loans"
WHERE property_state = 'PA'
LIMIT 10</textarea>
          <div class="query-actions">
            <button id="run-btn">Run Query</button>
            <span class="hint">Ctrl+Enter to run</span>
            <span id="status" class="status"></span>
          </div>
        </section>
        <section class="results">
          <div id="error" class="error hidden"></div>
          <div id="result-table-wrapper" class="hidden">
            <table id="result-table"></table>
            <p id="row-count"></p>
          </div>
        </section>
      </div>
    </main>

    <script type="module">
      import { WrenEngine } from "https://unpkg.com/@wrenai/wren-core-wasm@0.4.1/dist/index.js";

      const R2_URL = "https://pub-a0dfcedd4df848e5bfca15cca210aea5.r2.dev/2024/Q1/loans.parquet";

      const loadStatus = document.getElementById("load-status");
      const progressFill = document.getElementById("progress-fill");
      const loadingDiv = document.getElementById("loading");
      const appDiv = document.getElementById("app");
      const sqlInput = document.getElementById("sql-input");
      const runBtn = document.getElementById("run-btn");
      const statusEl = document.getElementById("status");
      const errorDiv = document.getElementById("error");
      const tableWrapper = document.getElementById("result-table-wrapper");
      const resultTable = document.getElementById("result-table");
      const rowCountEl = document.getElementById("row-count");

      let engine = null;

      const MDL_COLS = [
        "loan_id","monthly_reporting_period","channel","seller_name","servicer_name",
        "original_interest_rate","current_interest_rate","original_upb","current_actual_upb",
        "original_loan_term","origination_date","first_payment_date","loan_age","maturity_date",
        "original_ltv","original_cltv","number_of_borrowers","dti",
        "borrower_credit_score_at_origination","co_borrower_credit_score_at_origination",
        "first_time_home_buyer_indicator","loan_purpose","property_type","number_of_units",
        "occupancy_status","property_state","msa","zip_code_short",
      ];

      const MDL = {
        catalog: "wren", schema: "public",
        models: [{
          name: "Loans", tableReference: { table: "loans" },
          columns: MDL_COLS.map(c => {
            const t = c.includes("_score") || c.includes("_term") || c.includes("_age") || c === "dti"
              || c.includes("_ltv") || c.includes("_cltv") || c.includes("_units") || c.includes("_borrowers") ? "INTEGER"
              : c.includes("_upb") || c.includes("_rate") || c.includes("_percentage") ? "DOUBLE"
              : "VARCHAR";
            return { name: c, type: t };
          }),
          primaryKey: "loan_id",
        }],
        relationships: [], views: [],
      };

      function setStatus(msg, cls) {
        statusEl.textContent = msg;
        statusEl.className = `status ${cls || ""}`;
      }

      async function init() {
        try {
          loadStatus.textContent = "Loading DataFusion WASM engine…";
          progressFill.style.width = "5%";
          engine = await WrenEngine.init();

          loadStatus.textContent = "Downloading data from R2 (38.8 MB)…";
          progressFill.style.width = "15%";
          const t0 = performance.now();
          const resp = await fetch(R2_URL);
          if (!resp.ok) throw new Error("HTTP " + resp.status);
          const buf = await resp.arrayBuffer();
          progressFill.style.width = "75%";
          loadStatus.textContent = "Downloaded " + (buf.byteLength / 1048576).toFixed(1) + " MB in " + ((performance.now() - t0) / 1000).toFixed(1) + "s";

          loadStatus.textContent = "Parsing Parquet…";
          await engine.registerParquet("loans", buf);
          progressFill.style.width = "90%";

          loadStatus.textContent = "Loading schema…";
          await engine.loadMDL(MDL, { source: "" });
          progressFill.style.width = "100%";

          loadStatus.textContent = "Ready";
          setTimeout(() => { loadingDiv.classList.add("hidden"); appDiv.classList.remove("hidden"); }, 500);
        } catch (e) {
          loadStatus.textContent = "Error: " + (e.message || e);
          progressFill.style.background = "var(--error)";
          console.error(e);
        }
      }

      async function runQuery() {
        const sql = sqlInput.value.trim();
        if (!sql || !engine) return;
        errorDiv.classList.add("hidden");
        tableWrapper.classList.add("hidden");
        setStatus("Running…", "loading");
        runBtn.disabled = true;
        try {
          const t0 = performance.now();
          const rows = await engine.query(sql);
          const ms = (performance.now() - t0).toFixed(0);
          setStatus(rows.length + " rows in " + ms + "ms", "success");
          renderResults(rows);
        } catch (e) {
          setStatus("Error", "error");
          errorDiv.textContent = e.message || String(e);
          errorDiv.classList.remove("hidden");
        } finally {
          runBtn.disabled = false;
        }
      }

      function renderResults(rows) {
        if (!rows.length) { errorDiv.textContent = "No results."; errorDiv.classList.remove("hidden"); return; }
        const keys = Object.keys(rows[0]);
        resultTable.innerHTML = "";
        const thead = document.createElement("thead");
        const hr = document.createElement("tr");
        keys.forEach(k => { const th = document.createElement("th"); th.textContent = k; hr.appendChild(th); });
        thead.appendChild(hr);
        const tbody = document.createElement("tbody");
        rows.forEach(row => {
          const tr = document.createElement("tr");
          keys.forEach(k => { const td = document.createElement("td"); td.textContent = row[k] ?? ""; tr.appendChild(td); });
          tbody.appendChild(tr);
        });
        resultTable.appendChild(thead);
        resultTable.appendChild(tbody);
        rowCountEl.textContent = rows.length.toLocaleString() + " rows";
        tableWrapper.classList.remove("hidden");
      }

      runBtn.addEventListener("click", runQuery);
      sqlInput.addEventListener("keydown", e => {
        if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) { e.preventDefault(); runQuery(); }
      });

      init();
    </script>
  </body>
</html>
