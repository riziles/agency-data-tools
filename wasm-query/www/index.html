<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fannie Mae — DataFusion WASM</title>
  <style>
    :root { --bg: #1a1a2e; --surface: #16213e; --primary: #e94560; --text: #eaeaea; --muted: #888; --border: #333; --success: #4caf50; --error: #f44336; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { background: var(--surface); padding: 1.5rem 2rem; border-bottom: 2px solid var(--primary); }
    header h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .subtitle { color: var(--muted); font-size: 0.9rem; }
    main { max-width: 100%; padding: 1rem; }
    .query-panel { background: var(--surface); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    #sql-input { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem; font-family: monospace; font-size: 0.9rem; resize: vertical; }
    #sql-input:focus { outline: none; border-color: var(--primary); }
    .query-actions { display: flex; align-items: center; gap: 1rem; margin-top: 0.75rem; flex-wrap: wrap; }
    #run-btn { background: var(--primary); color: white; border: none; border-radius: 6px; padding: 0.5rem 1.5rem; font-size: 0.9rem; cursor: pointer; }
    #run-btn:hover { opacity: 0.85; } #run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .hint { color: var(--muted); font-size: 0.8rem; }
    .status { margin-left: auto; font-size: 0.8rem; } .status.success { color: var(--success); } .status.error { color: var(--error); } .status.loading { color: var(--muted); }
    .init-panel { background: var(--surface); border-radius: 8px; padding: 2rem; text-align: center; margin-bottom: 1rem; }
    .init-panel p { color: var(--muted); margin-bottom: 1rem; }
    .progress-bar { width: 100%; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin: 0.5rem 0; }
    .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.5s; width: 0%; }
    .results { background: var(--surface); border-radius: 8px; padding: 1rem; overflow-x: auto; }
    .hidden { display: none; }
    .error-box { color: var(--error); padding: 1rem; border: 1px solid var(--error); border-radius: 6px; white-space: pre-wrap; font-family: monospace; font-size: 0.85rem; }
    #result-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    #result-table th { background: var(--bg); color: var(--primary); padding: 0.5rem 0.75rem; text-align: left; white-space: nowrap; position: sticky; top: 0; }
    #result-table td { padding: 0.35rem 0.75rem; border-bottom: 1px solid var(--border); white-space: nowrap; max-width: 250px; overflow: hidden; text-overflow: ellipsis; }
    #result-table tr:hover td { background: rgba(233, 69, 96, 0.08); }
    #row-count { color: var(--muted); font-size: 0.8rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <header>
    <h1>Fannie Mae Loan Performance Data</h1>
    <p class="subtitle">2024 Q1 — 3,989,404 loans — DataFusion WASM (byte-range fetch)</p>
  </header>
  <main>
    <div id="loading" class="init-panel">
      <p id="load-status">Loading DataFusion WASM...</p>
      <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
    </div>
    <div id="app" class="hidden">
      <section class="query-panel">
        <textarea id="sql-input" rows="4">SELECT property_state, count(*) as cnt FROM data GROUP BY property_state ORDER BY cnt DESC LIMIT 10</textarea>
        <div class="query-actions">
          <button id="run-btn">Run Query</button>
          <span class="hint">Ctrl+Enter</span>
          <span id="status" class="status"></span>
        </div>
      </section>
      <section class="results">
        <div id="error" class="error-box hidden"></div>
        <div id="result-table-wrapper" class="hidden">
          <table id="result-table"></table>
          <p id="row-count"></p>
        </div>
      </section>
    </div>
  </main>

<script type="module">
import init, { query_parquet } from "./wasm_query.js";

const R = (id) => document.getElementById(id);
const R2_URL = "https://pub-a0dfcedd4df848e5bfca15cca210aea5.r2.dev/2024/Q1/loans.parquet";
const TOTAL_SIZE = 40689130;

let parquetFileMeta = null;
let parquetBytes = null;
let loaded = false;

// ── Parquet structure helpers ──
const PAR1 = new Uint8Array([0x50, 0x41, 0x52, 0x31]);

async function fetchRange(offset, length) {
  const end = offset + length - 1;
  const resp = await fetch(R2_URL, {
    headers: { Range: `bytes=${offset}-${end}` }
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return new Uint8Array(await resp.arrayBuffer());
}

async function fetchFooter() {
  // Fetch last 256KB (footer + footer_length + PAR1 + margin)
  const footerBuf = await fetchRange(Math.max(0, TOTAL_SIZE - 262144), 262144);
  
  // Find PAR1 marker at end
  const footerEnd = footerBuf.length;
  // footer_length is 4 bytes before PAR1
  const footerLen = new DataView(footerBuf.buffer, footerBuf.byteOffset + footerEnd - 8, 4).getInt32(0, true);
  
  // Extract just the footer bytes + footer_len + PAR1
  const footerBytes = footerBuf.slice(footerEnd - 8 - footerLen);
  return { footerBytes, footerLen };
}

function getRowGroupByteRanges(footerBytes) {
  // Parse the footer to find row group column offsets
  // The footer is a Thrift-encoded FileMetaData. We search for the column
  // offsets by looking at the first column's file_offset in each row group.
  //
  // Simpler approach: scan the footer for the Parquet magic metadata
  // Each row group in the footer has column chunks with file_offset values.
  // We search for plausible offset patterns (multiples of page size, under file size).
  
  // For now, just partition the file into 4 equal ~10MB row groups.
  // This works because DataFusion wrote the file with consistent row group sizes.
  const NUM_RG = 4;
  const footerSize = 8 + footerBytes.length; // footer bytes + 4B len + 4B magic
  const dataSize = TOTAL_SIZE - footerSize;
  const rgSize = Math.floor(dataSize / NUM_RG);
  
  const ranges = [];
  for (let i = 0; i < NUM_RG; i++) {
    const start = 4; // skip PAR1 header
    const offset = start + i * rgSize;
    const end = i === NUM_RG - 1 ? TOTAL_SIZE - footerSize : start + (i + 1) * rgSize;
    ranges.push({ index: i, offset, length: end - offset });
  }
  return ranges;
}

// ── Init ──
async function initAll() {
  const fill = R("progress-fill");
  const status = R("load-status");

  status.textContent = "Loading DataFusion WASM (21 MB gzip)...";
  fill.style.width = "5%";
  await init();
  fill.style.width = "25%";
  status.textContent = "Fetching Parquet footer (byte-range, 256 KB)...";

  const { footerBytes } = await fetchFooter();
  fill.style.width = "35%";
  status.textContent = "Footer loaded — fetching row groups...";

  // Parse row group byte ranges
  const rgRanges = getRowGroupByteRanges(footerBytes);
  status.textContent = `Footer loaded — ${rgRanges.length} row groups, fetching...`;

  // Download all row groups in parallel via byte-range
  const chunks = [];
  let downloaded = 0;
  const totalData = rgRanges.reduce((s, r) => s + r.length, 0);

  await Promise.all(rgRanges.map(async (rg) => {
    const bytes = await fetchRange(rg.offset, rg.length);
    chunks.push({ index: rg.index, offset: rg.offset, bytes });
    downloaded += bytes.length;
    fill.style.width = (35 + (downloaded / totalData) * 55) + "%";
    status.textContent = `Downloading row groups... ${(downloaded/1024/1024).toFixed(0)} MB / ${(totalData/1024/1024).toFixed(0)} MB`;
  }));

  // Assemble valid Parquet with row groups at original offsets
  // The footer contains absolute byte offsets, so row groups must be
  // at their original positions in the file.
  chunks.sort((a, b) => a.index - b.index);
  const assembled = new Uint8Array(TOTAL_SIZE);
  assembled.set(PAR1, 0);
  for (const chunk of chunks) {
    assembled.set(chunk.bytes, chunk.offset);
  }
  // Footer at end (original position)
  assembled.set(footerBytes, TOTAL_SIZE - footerBytes.length);
  
  parquetBytes = assembled;
  parquetFileMeta = { numRowGroups: rgRanges.length, totalDataBytes: totalData };

  fill.style.width = "100%";
  const totalMB = (assembled.length / 1024 / 1024).toFixed(1);
  status.textContent = `Ready — ${totalMB} MB Parquet (byte-range assembled)`;

  loaded = true;
  setTimeout(() => {
    R("loading").classList.add("hidden");
    R("app").classList.remove("hidden");
  }, 300);
}

// ── Query ──
R("sql-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) { e.preventDefault(); runQuery(); }
});
R("run-btn").addEventListener("click", runQuery);

async function runQuery() {
  const sql = R("sql-input").value.trim();
  if (!sql || !loaded) return;

  R("error").classList.add("hidden");
  R("result-table-wrapper").classList.add("hidden");
  R("status").textContent = "Running...";
  R("status").className = "status loading";
  R("run-btn").disabled = true;

  try {
    const t0 = performance.now();
    const resultStr = await query_parquet(parquetBytes, sql);
    const result = JSON.parse(resultStr);
    const ms = (performance.now() - t0).toFixed(0);

    const rows = result.result_rows;
    const mb = (result.parquet_bytes / 1024 / 1024).toFixed(0);
    R("status").textContent = `${rows?.toLocaleString()} rows in ${ms}ms (${mb} MB scanned, ${parquetFileMeta?.numRowGroups ?? '?'} row groups)`;
    R("status").className = "status success";

    if (!result.data || result.data.length === 0) {
      R("error").textContent = "Query returned 0 rows.";
      R("error").classList.remove("hidden");
      return;
    }
    renderTable(result.data);
  } catch (e) {
    R("status").textContent = "Error";
    R("status").className = "status error";
    R("error").textContent = e.message || String(e);
    R("error").classList.remove("hidden");
    console.error(e);
  } finally {
    R("run-btn").disabled = false;
  }
}

function renderTable(data) {
  const keys = Object.keys(data[0]);
  const thead = document.createElement("thead");
  const hr = document.createElement("tr");
  keys.forEach(k => { const th = document.createElement("th"); th.textContent = k; hr.appendChild(th); });
  thead.appendChild(hr);
  const tbody = document.createElement("tbody");
  const maxRows = Math.min(data.length, 1000);
  for (let i = 0; i < maxRows; i++) {
    const tr = document.createElement("tr");
    keys.forEach(k => { const td = document.createElement("td"); td.textContent = data[i][k] ?? ""; tr.appendChild(td); });
    tbody.appendChild(tr);
  }
  R("result-table").innerHTML = "";
  R("result-table").appendChild(thead);
  R("result-table").appendChild(tbody);
  R("row-count").textContent = `${data.length.toLocaleString()} rows` + (data.length > maxRows ? ` (showing ${maxRows})` : "");
  R("result-table-wrapper").classList.remove("hidden");
}

initAll().catch(e => {
  R("load-status").textContent = "Startup failed: " + (e.message || e);
  R("progress-fill").style.background = "var(--error)";
  console.error(e);
});
</script>
</body>
</html>
